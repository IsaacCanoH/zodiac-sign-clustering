<div class="modal fade" id="loadDataModal" tabindex="-1" aria-labelledby="loadDataModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <div>
                    <h2 class="modal-title fs-5" id="loadDataModalLabel">Cargar conjunto de datos</h2>
                    <p class="text-secondary small mb-0">Selecciona el archivo que deseas analizar.</p>
                </div>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
            </div>
            <form method="post" action="{% url 'datasets:upload' %}" enctype="multipart/form-data">
                {% csrf_token %}
                <div class="modal-body">
                    <label for="{{ dataset_form.file.id_for_label }}" class="form-label fw-semibold">{{ dataset_form.file.label }}</label>
                    {{ dataset_form.file }}
                    <div class="form-text">Formato admitido: CSV en UTF-8, con un tamaño máximo de 10 MB.</div>
                    {% if dataset %}
                        <div class="alert alert-warning mt-4 mb-0" role="note">Al cargar un archivo nuevo se reemplazará el dataset actual.</div>
                    {% endif %}
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Cargar dataset</button>
                </div>
            </form>
        </div>
    </div>
</div>
